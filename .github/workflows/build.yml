name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Build and Archive
      run: |
        # In a pure SPM project, xcodebuild -archive -workspace . is the standard way 
        # to force scheme discovery. We target 'generic/platform=iOS Simulator' 
        # to ensure stability in unsigned CI environments.
        xcodebuild archive \
          -workspace . \
          -scheme Sync \
          -destination "generic/platform=iOS Simulator" \
          -archivePath build/Sync.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        # Locate the compiled .app bundle. 
        # For SPM projects, xcodebuild places it in the Products/Applications dir of the archive.
        APP_PATH=$(find build/Sync.xcarchive/Products/Applications -name "*.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: Sync.app not found in archive. Listing archive contents for diagnosis:"
          find build/Sync.xcarchive -maxdepth 4
          exit 1
        fi
        
        echo "Found app at $APP_PATH"
        cp -r "$APP_PATH" build/Payload/
        
        # Pure SPM builds often lack a generated Info.plist in the bundle.
        # We inject a minimal one if missing to ensure the IPA is valid.
        if [ ! -f "build/Payload/Sync.app/Info.plist" ]; then
            echo "Injecting mandatory Info.plist"
            cat <<EOF > "build/Payload/Sync.app/Info.plist"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.4.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key><string>Sync</string>
                <key>CFBundleIdentifier</key><string>com.dauphin.sync</string>
                <key>CFBundleName</key><string>Sync</string>
                <key>CFBundlePackageType</key><string>APPL</string>
                <key>CFBundleShortVersionString</key><string>1.0</string>
                <key>CFBundleVersion</key><string>1</string>
                <key>MinimumOSVersion</key><string>17.0</string>
                <key>UILaunchScreen</key><dict/>
            </dict>
            </plist>
EOF
        fi
        
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sync-IPA
        path: build/Sync.ipa

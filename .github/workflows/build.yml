name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Resolve Dependencies
      run: swift package resolve

    - name: Build and Archive
      run: |
        xcodebuild archive \
          -packageSync \
          -scheme Sync \
          -destination "generic/platform=iOS" \
          -archivePath build/Sync.xcarchive \
          CODE_SIGNING_ALLOWED=NO

    - name: Export IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Sync.xcarchive/Products/usr/local/bin/Sync build/Payload/ || \
        cp -r build/Sync.xcarchive/Products/Applications/Sync.app build/Payload/ || \
        find build/Sync.xcarchive -name "*.app" -exec cp -r {} build/Payload/ \;
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sync-IPA
        path: build/Sync.ipa

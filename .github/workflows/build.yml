name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Build with SwiftPM
      run: |
        # Direct swift build targeting the iOS simulator for stable unsigned CI compilation.
        swift build -c release --triple arm64-apple-ios17.0-simulator
        
    - name: Create IPA
      run: |
        mkdir -p build/Payload/Sync.app
        # Locate the binary produced by swift build
        BINARY_PATH=$(swift build -c release --triple arm64-apple-ios17.0-simulator --show-bin-path)/Sync
        if [ ! -f "$BINARY_PATH" ]; then
          echo "Error: Binary not found at $BINARY_PATH"
          exit 1
        fi
        cp "$BINARY_PATH" build/Payload/Sync.app/Sync
        
        # Inject the mandatory Info.plist for an iOS app bundle
        cat <<EOF > build/Payload/Sync.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.4.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Sync</string>
            <key>CFBundleIdentifier</key>
            <string>com.dauphin.sync</string>
            <key>CFBundleName</key>
            <string>Sync</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
        </dict>
        </plist>
        EOF
        
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sync-IPA
        path: build/Sync.ipa

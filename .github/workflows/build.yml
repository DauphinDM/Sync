name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Resolve Dependencies
      run: xcodebuild -resolvePackageDependencies -scheme Sync -destination "generic/platform=iOS Simulator"

    - name: Build with xcodebuild
      run: |
        # Use a flat build structure and explicitly target the simulator to ensure
        # all dependencies (like iUX-iOS) are correctly resolved and linked.
        xcodebuild build \
          -scheme Sync \
          -destination "generic/platform=iOS Simulator" \
          -derivedDataPath build/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        # Locate the compiled .app bundle in the DerivedData directory.
        APP_PATH=$(find build/DerivedData -name "Sync.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: Sync.app not found in DerivedData. Listing build artifacts:"
          find build/DerivedData -maxdepth 5
          exit 1
        fi
        
        echo "Found app at $APP_PATH"
        cp -r "$APP_PATH" build/Payload/
        
        # In a pure SPM build, Info.plist is often not created in the bundle by default.
        # We must provide a valid one for the IPA to be installable.
        if [ ! -f "build/Payload/Sync.app/Info.plist" ]; then
            echo "Injecting mandatory Info.plist"
            cat <<EOF > "build/Payload/Sync.app/Info.plist"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.4.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key><string>Sync</string>
                <key>CFBundleIdentifier</key><string>com.dauphin.sync</string>
                <key>CFBundleName</key><string>Sync</string>
                <key>CFBundlePackageType</key><string>APPL</string>
                <key>CFBundleShortVersionString</key><string>1.0</string>
                <key>CFBundleVersion</key><string>1</string>
                <key>LSRequiresIPhoneOS</key><true/>
                <key>MinimumOSVersion</key><string>17.0</string>
                <key>UILaunchScreen</key><dict/>
                <key>UISupportedInterfaceOrientations</key>
                <array>
                    <string>UIInterfaceOrientationPortrait</string>
                </array>
            </dict>
            </plist>
EOF
        fi
        
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sync-IPA
        path: build/Sync.ipa

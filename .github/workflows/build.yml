name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme Sync \
          -archivePath build/Sync.xcarchive \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO

    - name: Export IPA (Unsigned/Signed Placeholder)
      run: |
        mkdir -p build/Payload
        cp -r build/Sync.xcarchive/Products/Applications/Sync.app build/Payload/
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Sync-IPA
        path: build/Sync.ipa

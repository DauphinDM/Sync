name: Build and Release IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Resolve Dependencies
      run: swift package resolve

    - name: Build and Archive
      run: |
        xcodebuild archive \
          -packageSync . \
          -scheme SyncApp \
          -destination "generic/platform=iOS" \
          -archivePath build/Sync.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Export IPA
      run: |
        mkdir -p build/Payload
        # Locate the output bundle. SwiftPM executables in archives are often found in unusual spots.
        # We search specifically for the .app directory or the binary named 'Sync'.
        APP_PATH=$(find build/Sync.xcarchive -name "*.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "No .app found in archive. Checking for executable..."
          BINARY_PATH=$(find build/Sync.xcarchive -type f -perm +111 -name "Sync" | head -n 1)
          if [ -n "$BINARY_PATH" ]; then
            echo "Found binary at $BINARY_PATH, wrapping in app container"
            mkdir -p build/Payload/Sync.app
            cp "$BINARY_PATH" build/Payload/Sync.app/Sync
          else
            echo "Failed to find any build products"
            exit 1
          fi
        else
          echo "Found .app at $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
        fi
        cd build
        zip -r Sync.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sync-IPA
        path: build/Sync.ipa
